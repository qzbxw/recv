services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-recv}
      POSTGRES_USER: ${POSTGRES_USER:-recv}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-recv}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-recv} -d ${POSTGRES_DB:-recv}"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    image: ${GHCR_IMAGE_PREFIX:-ghcr.io/your-org/recv}/api:${GHCR_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      APP_RUNTIME: api
      DATABASE_URL: ${DATABASE_URL:-postgres://recv:recv@postgres:5432/recv?sslmode=disable}
      METRICS_PORT: ${API_METRICS_PORT:-9090}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-https://recv.money}
      MEDIA_DIR: /data/media
    volumes:
      - media_data:/data/media
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 12

  blockchain_watcher:
    image: ${GHCR_IMAGE_PREFIX:-ghcr.io/your-org/recv}/api:${GHCR_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      APP_RUNTIME: watcher
      DATABASE_URL: ${DATABASE_URL:-postgres://recv:recv@postgres:5432/recv?sslmode=disable}
      METRICS_PORT: ${WATCHER_METRICS_PORT:-9091}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:${WATCHER_METRICS_PORT:-9091}/healthz >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 12

  telegram_bot_worker:
    image: ${GHCR_IMAGE_PREFIX:-ghcr.io/your-org/recv}/api:${GHCR_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      APP_RUNTIME: bot
      DATABASE_URL: ${DATABASE_URL:-postgres://recv:recv@postgres:5432/recv?sslmode=disable}
      METRICS_PORT: ${BOT_METRICS_PORT:-9092}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:${BOT_METRICS_PORT:-9092}/healthz >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 12

  frontend_public:
    image: ${GHCR_IMAGE_PREFIX:-ghcr.io/your-org/recv}/frontend-public:${GHCR_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: frontend-public/Dockerfile
      args:
        PUBLIC_APP_URL: ${PUBLIC_APP_URL:-https://recv.money}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://recv.money}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://recv.money}
        GTM_ID: ${GTM_ID:-}
        YANDEX_METRIKA_ID: ${YANDEX_METRIKA_ID:-}
        GOOGLE_SITE_VERIFICATION: ${GOOGLE_SITE_VERIFICATION:-}
        YANDEX_VERIFICATION: ${YANDEX_VERIFICATION:-}
    restart: unless-stopped
    depends_on:
      - api
    environment:
      BACKEND_INTERNAL_URL: http://api:8080

  frontend:
    image: ${GHCR_IMAGE_PREFIX:-ghcr.io/your-org/recv}/frontend:${GHCR_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://recv.money}
    restart: unless-stopped
    depends_on:
      - api
      - frontend_public
    expose:
      - "80"

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    depends_on:
      - frontend
    environment:
      CADDY_SITE_ADDRESS: ${CADDY_SITE_ADDRESS:-localhost}
    ports:
      - "8080:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  restic:
    image: restic/restic:0.17.3
    profiles: ["ops"]
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      RESTIC_REPOSITORY: ${RESTIC_REPOSITORY:-}
      RESTIC_PASSWORD: ${RESTIC_PASSWORD:-}
    volumes:
      - ./backups:/backup:ro
      - ./docs:/docs:ro
      - restore_data:/restore
    entrypoint: ["restic"]

volumes:
  postgres_data:
  media_data:
  caddy_data:
  caddy_config:
  restore_data:
