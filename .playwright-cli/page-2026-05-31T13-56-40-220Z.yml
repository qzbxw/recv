          - generic [ref=e393]: FAQ
          - heading "Protocol Details." [level=2] [ref=e394]
        - generic [ref=e396]:
          - generic [ref=e397]:
            - button "Protocol Detail 01 How does Reqst ensure the security of my funds?" [ref=e399] [cursor=pointer]:
              - generic [ref=e400]:
                - generic [ref=e401]: Protocol Detail 01
                - generic [ref=e402]: How does Reqst ensure the security of my funds?
            - paragraph [ref=e409]: We utilize a non-custodial architecture. This means your private keys never leave your device, and funds are sent directly from the client to your address. Reqst only monitors the blockchain and provides transaction notifications.
          - generic [ref=e410]:
            - button "Protocol Detail 02 Which networks and assets are currently supported?" [ref=e412] [cursor=pointer]:
              - generic [ref=e413]:
                - generic [ref=e414]: Protocol Detail 02
                - generic [ref=e415]: Which networks and assets are currently supported?
            - paragraph [ref=e421]: We currently support TON, TRON (USDT), Solana, and major EVM chains (Base, BSC, Arbitrum). We are continuously adding new liquid protocols based on enterprise-tier demands.
          - generic [ref=e422]:
            - button "Protocol Detail 03 Can I automate the delivery of digital goods?" [ref=e424] [cursor=pointer]:
              - generic [ref=e425]:
                - generic [ref=e426]: Protocol Detail 03
                - generic [ref=e427]: Can I automate the delivery of digital goods?
            - paragraph [ref=e433]: Absolutely. Our Webhook system provides instantaneous notifications to your server upon payment confirmation, enabling full automation of access, subscriptions, or digital delivery.
          - generic [ref=e434]:
            - button "Protocol Detail 04 How are underpayments or incorrect amounts handled?" [ref=e436] [cursor=pointer]:
              - generic [ref=e437]:
                - generic [ref=e438]: Protocol Detail 04
                - generic [ref=e439]: How are underpayments or incorrect amounts handled?
            - paragraph [ref=e445]: Reqst intelligently detects any deviations from the expected amount. If an underpayment occurs, the transaction is flagged as 'Underpaid,' allowing you to either request the balance or manually approve the order.
          - generic [ref=e446]:
            - button "Protocol Detail 05 Do I need to pass KYC to start using Reqst?" [ref=e448] [cursor=pointer]:
              - generic [ref=e449]:
                - generic [ref=e450]: Protocol Detail 05
                - generic [ref=e451]: Do I need to pass KYC to start using Reqst?
            - paragraph [ref=e457]: No. Since we operate strictly as non-custodial middleware and do not hold or process fiat currency, we do not require KYC verification from merchants. You can start accepting crypto immediately.
          - generic [ref=e458]:
            - button "Protocol Detail 06 Is there a limit on how many invoices I can create?" [ref=e460] [cursor=pointer]:
              - generic [ref=e461]:
                - generic [ref=e462]: Protocol Detail 06
                - generic [ref=e463]: Is there a limit on how many invoices I can create?
            - paragraph [ref=e469]: There are absolutely no limits on invoice creation. You can generate millions of payment links. Our subscription tiers only restrict the number of API requests to our monitoring nodes.
          - generic [ref=e470]:
            - button "Protocol Detail 07 What happens if a network (e.g., Solana) goes down?" [ref=e472] [cursor=pointer]:
              - generic [ref=e473]:
                - generic [ref=e474]: Protocol Detail 07
                - generic [ref=e475]: What happens if a network (e.g., Solana) goes down?
            - paragraph [ref=e481]: Our watchers are distributed across multiple global RPC providers. If a network halts, Reqst queues the monitoring tasks. Once the blockchain resumes block production, all pending transactions will be automatically verified and webhooks fired.
