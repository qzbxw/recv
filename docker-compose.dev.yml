services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: recv
      POSTGRES_USER: recv
      POSTGRES_PASSWORD: recv
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recv -d recv"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    image: recv-api-dev
    build:
      context: .
      dockerfile: backend/Dockerfile.dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /app/backend
    volumes:
      - ./backend:/app/backend
      - go_dev_mod_cache:/go/pkg/mod
      - go_dev_build_cache:/root/.cache/go-build
    environment:
      APP_ENV: development
      APP_RUNTIME: api
      HTTP_PORT: "8080"
      METRICS_PORT: "9090"
      DATABASE_URL: postgres://recv:recv@postgres:5432/recv?sslmode=disable
      JWT_SECRET: dev-jwt-secret
      INTERNAL_TOKEN: dev-internal-token
      ALLOW_INSECURE_DEV_AUTH: "true"
      TELEGRAM_BOT_TOKEN: ""
      TELEGRAM_INIT_MAX_AGE_SECONDS: "86400"
      TON_USD_RATE: "2.50"
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin
      ADMIN_BOOTSTRAP_EMAIL: admin@example.com
      ADMIN_BOOTSTRAP_PASSWORD: admin
      ADMIN_JWT_SECRET: dev-admin-secret
      ADMIN_SESSION_TTL: 12h
      PUBLIC_APP_URL: http://localhost:3000
    # Ports are internal only, accessed via gateway

  frontend_public:
    image: recv-frontend-public-dev
    build:
      context: .
      dockerfile: frontend-public/Dockerfile.dev
    restart: unless-stopped
    depends_on:
      - api
    working_dir: /app
    volumes:
      - ./frontend-public:/app
      - frontend_public_node_modules:/app/node_modules
    environment:
      PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      NEXT_PUBLIC_API_URL: http://localhost:3000
      BACKEND_INTERNAL_URL: http://api:8080
    # Ports are internal only

  frontend:
    image: recv-frontend-dev
    build:
      context: .
      dockerfile: frontend/Dockerfile.dev
    restart: unless-stopped
    depends_on:
      - api
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      VITE_API_BASE_URL: http://localhost:3000
      VITE_ENABLE_DEV_AUTH: "true"
      CHOKIDAR_USEPOLLING: "true"
    # Ports are internal only

  gateway:
    image: recv-gateway-dev
    build:
      context: .
      dockerfile: frontend/Dockerfile.gateway.dev
    restart: unless-stopped
    depends_on:
      - frontend
      - frontend_public
    ports:
      - "3000:80"

volumes:
  postgres_dev_data:
  go_dev_mod_cache:
  go_dev_build_cache:
  frontend_node_modules:
  frontend_public_node_modules:
