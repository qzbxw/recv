server {
  listen 80;
  server_name _;
  resolver 127.0.0.11 valid=10s ipv6=off;

  set $api_upstream api;
  set $public_upstream frontend_public;

  # Compression
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

  location /api/ {
    add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
    proxy_pass http://$api_upstream:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /v1/ {
    add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
    proxy_pass http://$api_upstream:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /docs/ {
    add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
    proxy_pass http://$api_upstream:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /app {
    return 308 /app/;
  }

  # Canonical app namespace. Short app paths are redirected here.
  location ~ ^/(admin|console|auth|checkout|developers|developer-portal)(/|$) {
    return 308 /app$request_uri;
  }

  # Vite app: seller console, checkout, admin, developer docs.
  location /app/ {
    add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
    root /usr/share/nginx/html;
    index index.html;
    try_files $uri $uri/ /app/index.html;
  }

  # Next public site: localized marketing, legal, blog, robots, sitemap.
  location / {
    proxy_pass http://$public_upstream:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
