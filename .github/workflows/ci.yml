name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - name: Test
        run: go test ./...
      - name: Coverage
        run: |
          go test ./... -coverpkg=./internal/... -coverprofile=coverage.out
          COVERAGE_MIN=90 sh scripts/check-coverage.sh coverage.out

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build

  frontend-public:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-public
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend-public/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare production env
        run: |
          cat > .env <<'EOF'
          APP_ENV=production
          POSTGRES_DB=reqst
          POSTGRES_USER=reqst
          POSTGRES_PASSWORD=reqst
          JWT_SECRET=ci-jwt-secret
          INTERNAL_TOKEN=ci-internal-token
          TELEGRAM_BOT_TOKEN=
          ADMIN_BOOTSTRAP_EMAIL=admin@reqst.local
          ADMIN_BOOTSTRAP_PASSWORD=ci-admin-password
          ADMIN_JWT_SECRET=ci-admin-secret
          PUBLIC_APP_URL=http://localhost:3000
          NEXT_PUBLIC_SITE_URL=http://localhost:3000
          NEXT_PUBLIC_API_URL=http://api:8080
          VITE_API_BASE_URL=http://localhost:3000
          TON_USD_RATE=2.50
          EOF
      - name: Build production containers
        run: docker compose build
      - name: Build development containers
        run: docker compose -f docker-compose.dev.yml build
      - name: Start production smoke stack
        run: docker compose up -d postgres api frontend_public frontend
      - name: Smoke routes
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:3000/en >/dev/null; then
              break
            fi
            sleep 2
          done
          curl -fsSI http://localhost:3000/ | grep -E "30[78]"
          curl -fsS http://localhost:3000/en >/dev/null
          curl -fsS http://localhost:3000/app/ >/dev/null
          curl -fsS http://localhost:3000/docs/index.html >/dev/null
          curl -sS -o /tmp/v1_me.out -w "%{http_code}" http://localhost:3000/v1/me | grep -E "401|403"
          curl -sS -o /tmp/admin_login.out -w "%{http_code}" -H "Content-Type: application/json" -d '{"username":"admin","password":"admin"}' http://localhost:3000/api/admin/login | grep -E "401|403"
      - name: Dump docker logs
        if: failure()
        run: docker compose logs --no-color
      - name: Stop containers
        if: always()
        run: docker compose down -v

  security:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            frontend-public/package-lock.json
      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest
      - name: gosec
        run: gosec ./...
        working-directory: backend
      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...
        working-directory: backend
      - name: npm audit frontend
        run: npm audit --audit-level=high
        working-directory: frontend
      - name: npm audit public frontend
        run: npm audit --audit-level=high
        working-directory: frontend-public
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"

  codeql:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: ["go", "javascript-typescript"]
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3

  images:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}/reqst
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/api:${{ github.sha }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend-public/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/frontend-public:${{ github.sha }}
