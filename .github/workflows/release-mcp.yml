name: Release MCP server

# Publishes mcp-server to npm as `recv-mcp`.
# Trigger: push a tag like mcp-v1.0.0 (tag version must match package.json),
# or run manually. Requires the NPM_TOKEN repository secret (an npm
# "Automation" access token for the recv-mcp package).

on:
  push:
    tags: ["mcp-v*"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: mcp-server/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Check tag matches package version
        if: github.ref_type == 'tag'
        run: |
          pkg_version="$(node -p "require('./package.json').version")"
          tag_version="${GITHUB_REF_NAME#mcp-v}"
          if [ "$pkg_version" != "$tag_version" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json version $pkg_version"
            exit 1
          fi
      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
