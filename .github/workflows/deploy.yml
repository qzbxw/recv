name: CD

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy production
    runs-on: ubuntu-latest
    steps:
      - name: Prepare SSH private key
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -eu
          key_path="$RUNNER_TEMP/recv_deploy_key"
          umask 077

          if printf '%s' "$DEPLOY_SSH_KEY" | grep -q -- 'BEGIN .*PRIVATE KEY'; then
            printf '%b\n' "$DEPLOY_SSH_KEY" | tr -d '\r' > "$key_path"
          else
            printf '%s' "$DEPLOY_SSH_KEY" | tr -d '\r\n ' |
              base64 --decode > "$key_path" 2>/dev/null || {
                echo "::error::DEPLOY_SSH_KEY must contain a private OpenSSH/PEM key or its base64 encoding."
                exit 1
              }
          fi

          if ! grep -q -- 'BEGIN .*PRIVATE KEY' "$key_path"; then
            echo "::error::DEPLOY_SSH_KEY is not a private key. Store the contents of id_ed25519, not id_ed25519.pub."
            exit 1
          fi

          if ! ssh-keygen -y -P "" -f "$key_path" >/dev/null 2>&1; then
            echo "::error::DEPLOY_SSH_KEY is invalid or passphrase-protected. Use an unencrypted deployment private key."
            exit 1
          fi

      - name: Deploy exact commit over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key_path: ${{ runner.temp }}/recv_deploy_key
          envs: DEPLOY_SHA
          script_stop: true
          command_timeout: 30m
          script: |
            set -eu
            cd /root/recv
            test -f .env
            test -d .git

            previous_sha="$(git rev-parse HEAD)"
            git fetch --prune origin main
            git checkout --detach "$DEPLOY_SHA"

            mkdir -p backups
            if docker compose ps --status running postgres | grep -q postgres; then
              docker compose exec -T postgres sh -lc \
                'pg_dump -U "$POSTGRES_USER" "$POSTGRES_DB"' \
                > "backups/predeploy-$(date -u +%Y%m%dT%H%M%SZ).sql"
            fi

            if grep -Eq '^RESTIC_REPOSITORY=.+$' .env &&
               grep -Eq '^RESTIC_PASSWORD=.+$' .env; then
              docker compose --profile ops run --rm restic backup /backup
            fi

            docker compose build \
              api blockchain_watcher telegram_bot_worker frontend_public frontend
            docker compose up -d postgres
            docker compose up -d --remove-orphans \
              api blockchain_watcher telegram_bot_worker frontend_public frontend caddy

            # Caddy matches sites by Host header, so the edge check must send
            # the real site host instead of 127.0.0.1 (which matches no site).
            site_host="$(grep -E '^CADDY_SITE_ADDRESS=' .env | tail -n1 | cut -d= -f2- | tr -d '"' | sed -e 's#^https\?://##' -e 's#[:/].*##')"
            site_host="${site_host:-localhost}"

            echo "Waiting for health gate (api healthz + caddy robots.txt, Host: ${site_host})..."
            healthy=0
            for i in $(seq 1 60); do
              if docker compose exec -T api \
                   wget -qO- http://127.0.0.1:8080/healthz >/dev/null 2>&1 &&
                 docker compose exec -T caddy \
                   wget -qO- --header="Host: ${site_host}" http://127.0.0.1:80/robots.txt >/dev/null 2>&1; then
                healthy=1
                break
              fi
              sleep 2
            done

            if [ "$healthy" -eq 1 ]; then
              echo "Health gate passed."
              printf '%s' "$DEPLOY_SHA" > .deploy-sha
              docker image prune -f --filter "until=168h"
              exit 0
            fi

            echo "Health gate failed after 120s. Diagnostics:"
            docker compose exec -T api \
              wget -qO- http://127.0.0.1:8080/healthz || echo "api healthz: FAILED"
            docker compose exec -T caddy \
              wget -qO- --header="Host: ${site_host}" http://127.0.0.1:80/robots.txt >/dev/null || echo "caddy robots.txt: FAILED (Host: ${site_host})"
            docker compose logs --no-color --tail=200 \
              api frontend_public frontend caddy
            echo "Health gate failed; rolling back to $previous_sha"

            git checkout --detach "$previous_sha"
            docker compose build \
              api blockchain_watcher telegram_bot_worker frontend_public frontend
            docker compose up -d --remove-orphans \
              api blockchain_watcher telegram_bot_worker frontend_public frontend caddy
            exit 1
