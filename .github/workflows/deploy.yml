name: CD

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy production
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Prepare SSH private key
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -eu
          key_path="$RUNNER_TEMP/recv_deploy_key"
          umask 077

          if printf '%s' "$DEPLOY_SSH_KEY" | grep -q -- 'BEGIN .*PRIVATE KEY'; then
            printf '%b\n' "$DEPLOY_SSH_KEY" | tr -d '\r' > "$key_path"
          else
            printf '%s' "$DEPLOY_SSH_KEY" | tr -d '\r\n ' |
              base64 --decode > "$key_path" 2>/dev/null || {
                echo "::error::DEPLOY_SSH_KEY must contain a private OpenSSH/PEM key or its base64 encoding."
                exit 1
              }
          fi

          if ! grep -q -- 'BEGIN .*PRIVATE KEY' "$key_path"; then
            echo "::error::DEPLOY_SSH_KEY is not a private key. Store the contents of id_ed25519, not id_ed25519.pub."
            exit 1
          fi

          if ! ssh-keygen -y -P "" -f "$key_path" >/dev/null 2>&1; then
            echo "::error::DEPLOY_SSH_KEY is invalid or passphrase-protected. Use an unencrypted deployment private key."
            exit 1
          fi

      - name: Deploy exact commit over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          key_path: ${{ runner.temp }}/recv_deploy_key
          envs: DEPLOY_SHA
          command_timeout: 30m
          script: |
            set -eu
            # Переходим в папку проекта на сервере (задайте путь в секретах или используйте дефолт /root/recv)
            cd "${{ secrets.DEPLOY_PATH || '/root/recv' }}"
            
            echo "--> Получение изменений из git..."
            git fetch --prune origin
            
            echo "--> Запуск скрипта деплоя на сервере..."
            chmod +x ./deploy.sh
            ./deploy.sh "$DEPLOY_SHA"
